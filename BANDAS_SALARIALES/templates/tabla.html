{% extends "base.html" %}
{% block title %}Tabla — Bandas Salariales DC{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0 fw-bold"><i class="bi bi-table me-2 text-primary"></i>Tabla de empleados</h4>
  <div class="d-flex gap-2 align-items-center">
    <label class="text-muted small me-1">Snapshot:</label>
    <select id="selectSnapshot" class="form-select form-select-sm" style="width:auto">
      {% for s in snapshots %}
        <option value="{{ s.id }}" {% if s.id == import_id %}selected{% endif %}>
          {{ s.periodo }} · {{ s.fecha_carga }}
        </option>
      {% endfor %}
    </select>
  </div>
</div>

<!-- Filtros rápidos -->
<div class="card border-0 shadow-sm mb-3">
  <div class="card-body py-2 d-flex flex-wrap gap-3 align-items-center">
    <span class="text-muted small fw-semibold">Filtrar:</span>

    <div class="btn-group btn-group-sm" id="filtroSeniority">
      <button class="btn btn-outline-secondary active" data-val="">Todos</button>
      <button class="btn btn-outline-secondary" data-val="JR">JR</button>
      <button class="btn btn-outline-secondary" data-val="SSR">SSR</button>
      <button class="btn btn-outline-secondary" data-val="SR">SR</button>
    </div>

    <div class="btn-group btn-group-sm" id="filtroEstado">
      <button class="btn btn-outline-secondary active" data-val="">Todos</button>
      <button class="btn btn-outline-success"    data-val="OK">OK</button>
      <button class="btn btn-outline-warning"    data-val="REVISAR">Revisar</button>
      <button class="btn btn-outline-secondary"  data-val="null">Sin banda</button>
    </div>

    <div class="d-flex align-items-center gap-1">
      <label class="text-muted small fw-semibold mb-0">CECO:</label>
      <select id="filtroCECO" class="form-select form-select-sm" style="max-width:220px">
        <option value="">Todos</option>
      </select>
    </div>

    <button class="btn btn-sm btn-outline-danger" id="btnLimpiarFiltros">
      <i class="bi bi-x-circle me-1"></i>Limpiar
    </button>

    <span class="ms-auto text-muted small" id="contadorFilas"></span>
  </div>
</div>

<!-- Tabla -->
<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <table id="tablaEmpleados" class="table table-hover table-sm mb-0 w-100">
      <thead class="table-light">
        <tr>
          <th>Apellido</th>
          <th>Nombre</th>
          <th>Perfil</th>
          <th>Sen.</th>
          <th class="text-end">Remuneración</th>
          <th class="text-end">Lím. Inf.</th>
          <th class="text-end">Lím. Sup.</th>
          <th class="text-center">Estado</th>
          <th class="text-end">Var%</th>
          <th>CECO</th>
        </tr>
      </thead>
      <tbody id="tablaBody"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const importId = {{ import_id or 'null' }};
let dtTable   = null;
let allData   = [];
let filtroSen = '';
let filtroEst = '';
let filtroCeco = '';    // valor completo del CECO seleccionado

function fmtMoneda(v) {
  if (v == null) return '—';
  return '$ ' + Number(v).toLocaleString('es-AR', {maximumFractionDigits:0});
}

function estadoBadge(e) {
  if (!e) return '<span class="badge bg-secondary">Sin banda</span>';
  if (e === 'OK')      return '<span class="badge bg-success">OK</span>';
  if (e === 'REVISAR') return '<span class="badge bg-warning text-dark">Revisar</span>';
  return `<span class="badge bg-light text-dark">${e}</span>`;
}

function varPctSpan(v) {
  if (!v) return '—';
  if (v === 'EN BANDA') return '<span class="text-success fw-semibold">EN BANDA</span>';
  const num = parseFloat(v);
  if (!isNaN(num)) {
    const cls = num < 0 ? 'text-danger' : 'text-success';
    const icon = num < 0 ? '▼' : '▲';
    return `<span class="${cls}">${icon} ${v}</span>`;
  }
  return v;
}

function poblarCECO(data) {
  // Extrae CECOs únicos y los carga en el dropdown
  const sel = document.getElementById('filtroCECO');
  const cecos = [...new Set(data.map(r => r.ceco || '').filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todos</option>';
  cecos.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    // Mostrar solo la parte final: "2 007 00 - DC - ORIGENES" → "ORIGENES"
    opt.textContent = c.split(' - ').slice(-1)[0] || c;
    opt.title = c;   // tooltip con el nombre completo
    sel.appendChild(opt);
  });
  filtroCeco = '';
}

function cargarTabla(id) {
  fetch(`/api/tabla?import_id=${id}`)
    .then(r => r.json())
    .then(data => {
      allData = data;
      if (dtTable) { dtTable.destroy(); dtTable = null; }
      poblarCECO(data);
      renderTabla(data);
    });
}

function renderTabla(data) {
  const tbody = document.getElementById('tablaBody');
  tbody.innerHTML = '';
  data.forEach(r => {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.dataset.ceco = r.ceco || '';
    tr.onclick = () => window.location = `/empleado?cuil=${r.cuil}`;
    tr.innerHTML = `
      <td class="fw-semibold">${r.apellidos || '—'}</td>
      <td>${r.nombres || '—'}</td>
      <td><small>${r.perfil || '—'}</small></td>
      <td><span class="badge bg-light text-dark border">${r.seniority || '—'}</span></td>
      <td class="text-end fw-semibold">${fmtMoneda(r.remuneracion)}</td>
      <td class="text-end text-muted">${fmtMoneda(r.lim_inferior)}</td>
      <td class="text-end text-muted">${fmtMoneda(r.lim_superior)}</td>
      <td class="text-center">${estadoBadge(r.estado_vs_inf)}</td>
      <td class="text-end">${varPctSpan(r.var_pct)}</td>
      <td><small class="text-muted">${(r.ceco || '').split(' - ').slice(-1)[0] || '—'}</small></td>
    `;
    tbody.appendChild(tr);
  });

  dtTable = new DataTable('#tablaEmpleados', {
    pageLength: 25,
    language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' },
    order: [[0, 'asc']],
    columnDefs: [{ orderable: false, targets: [7, 8] }],
    drawCallback: actualizarContador,
  });
  actualizarContador();
}

function actualizarContador() {
  const info = dtTable ? dtTable.page.info() : { recordsDisplay: 0 };
  document.getElementById('contadorFilas').textContent =
    `${info.recordsDisplay} empleados`;
}

function aplicarFiltros() {
  if (!dtTable) return;
  $.fn.dataTable.ext.search = [];

  if (filtroSen || filtroEst || filtroCeco) {
    $.fn.dataTable.ext.search.push(function(settings, data, index) {
      const sen    = data[3].replace(/<[^>]*>/g,'').trim();
      const estado = data[7].replace(/<[^>]*>/g,'').trim().toUpperCase();
      // Obtener el CECO real desde el atributo data- del <tr>
      const trNode = dtTable.row(index).node();
      const ceco   = trNode ? (trNode.dataset.ceco || '') : '';

      const okSen  = !filtroSen  || sen === filtroSen;
      const okCeco = !filtroCeco || ceco === filtroCeco;
      let okEst = true;
      if (filtroEst === 'null') okEst = estado === 'SIN BANDA' || estado === '';
      else if (filtroEst)       okEst = estado === filtroEst;

      return okSen && okEst && okCeco;
    });
  }
  dtTable.draw();
}

// Selector de snapshot
document.getElementById('selectSnapshot').addEventListener('change', function() {
  cargarTabla(this.value);
});

// Filtro seniority
document.getElementById('filtroSeniority').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroSen = btn.dataset.val;
  aplicarFiltros();
});

// Filtro estado
document.getElementById('filtroEstado').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroEst = btn.dataset.val;
  aplicarFiltros();
});

// Filtro CECO
document.getElementById('filtroCECO').addEventListener('change', function() {
  filtroCeco = this.value;
  aplicarFiltros();
});

// Limpiar filtros
document.getElementById('btnLimpiarFiltros').addEventListener('click', function() {
  filtroSen = ''; filtroEst = ''; filtroCeco = '';
  document.querySelector('#filtroSeniority button').classList.add('active');
  document.querySelectorAll('#filtroSeniority button:not(:first-child)').forEach(b => b.classList.remove('active'));
  document.querySelector('#filtroEstado button').classList.add('active');
  document.querySelectorAll('#filtroEstado button:not(:first-child)').forEach(b => b.classList.remove('active'));
  document.getElementById('filtroCECO').value = '';
  aplicarFiltros();
});

// Carga inicial
if (importId) cargarTabla(importId);
</script>
{% endblock %}
